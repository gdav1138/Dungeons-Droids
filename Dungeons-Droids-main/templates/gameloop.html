<!DOCTYPE html>
<html>
<head>
  <title>Dungeons & Droids</title>
  <style>
    body { font-family: monospace; background: #111; color: #eee; padding: 20px; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .username { color: #6f6; }
    .logout-btn { padding: 6px 12px; background: #444; color: #eee; border: 1px solid #666; cursor: pointer; text-decoration: none; }
    .logout-btn:hover { background: #555; }
    .layout { display: grid; grid-template-columns: 1fr 420px; gap: 16px; }
    .panel { border: 1px solid #444; padding: 10px; border-radius: 6px; background: #0d0d0d; display: flex; flex-direction: column; }
    .log-panel { height: 60vh; }
    .right-column { display: flex; flex-direction: column; gap: 16px; height: 60vh; }
    #log { flex: 1; overflow-y: auto; }
    #map { flex: 1; overflow: auto; }
    #generated { flex: 1; overflow: auto; }
    #map img, #generated img { max-width: 100%; height: auto; display: block; }
    .stats-bar { display: flex; gap: 24px; padding: 8px 12px; border: 1px solid #333; border-radius: 6px; background: #0d0d0d; margin-top: 10px; font-size: 13px; color: #ccc; }
    .stat-item { display: flex; gap: 6px; align-items: center; }
    .stat-label { color: #888; }
    .stat-value { color: #eee; font-weight: bold; }
    .stat-gold .stat-value { color: #f5c842; }
    .stat-hp .stat-value { color: #e05c5c; }
    .stat-xp .stat-value { color: #7ecfaa; }
    .inventory-panel { margin-top: 12px; }
    #inventory { min-height: 48px; display: flex; flex-wrap: wrap; gap: 8px; }
    .inv-card { border: 1px solid #444; padding: 6px 8px; border-radius: 6px; background: #161616; min-width: 160px; max-width: 220px; }
    .inv-name { color: #eee; font-weight: bold; }
    .inv-meta { color: #8ad; font-size: 12px; }
    .inv-desc { color: #bbb; font-size: 12px; margin-top: 4px; }
    h3 { margin: 0 0 8px 0; color: #bbb; font-weight: normal; }
    .command-row { display: flex; align-items: center; gap: 16px; margin-top: 12px; }
    .command-row form { flex: 1; display: flex; gap: 6px; }
    input[type=text] { flex: 1; padding: 8px; }
    button[type=submit] { padding: 8px 14px; }
    .compass { display: grid; grid-template-columns: repeat(3, 34px); grid-template-rows: repeat(3, 34px); gap: 3px; flex-shrink: 0; }
    .compass-btn { display: flex; align-items: center; justify-content: center; background: #1a1a1a; border: 1px solid #444; color: #aaa; font-size: 11px; font-weight: bold; cursor: pointer; border-radius: 4px; width: 34px; height: 34px; transition: background 0.15s, color 0.15s; }
    .compass-btn:hover { background: #2a2a2a; color: #fff; border-color: #666; }
    .compass-btn.north { color: #6f6; border-color: #3a5a3a; }
    .compass-center { display: flex; align-items: center; justify-content: center; }
    .compass-pip { width: 8px; height: 8px; background: #444; border-radius: 50%; }
    .compass-empty { width: 34px; height: 34px; }
    .loading-msg { color: #888; font-style: italic; }
    .loading-msg::after { content: ''; animation: dots 1.2s steps(3, end) infinite; }
    @keyframes dots { 0%,100% { content: '.'; } 33% { content: '..'; } 66% { content: '...'; } }
    input:disabled, button:disabled { opacity: 0.45; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="header">
    <div class="username">Logged in as: {{ username }}</div>
    <div style="display:flex; gap:8px;">
      <button class="logout-btn" id="restartBtn">Restart</button>
      <a href="/logout" class="logout-btn">Logout</a>
    </div>
  </div>

  <div class="layout">
    <div class="panel log-panel">
      <h3>ADVENTURE LOG</h3>
      <div id="log"></div>
    </div>
    <div class="right-column">
      <div class="panel">
        <h3>MAP</h3>
        <div id="map"></div>
      </div>
      <div class="panel">
        <h3 id="room-name">ROOM</h3>
        <div id="generated"></div>
      </div>
    </div>
  </div>

  <div class="command-row">
    <form id="commandForm" onsubmit="return false;">
      <input type="text" id="command" name="command" placeholder="Enter command..." autofocus />
      <button type="submit">Send</button>
    </form>
    <div class="compass">
      <div class="compass-empty"></div>
      <button class="compass-btn north" data-dir="north" title="Go North">N</button>
      <div class="compass-empty"></div>
      <button class="compass-btn" data-dir="west" title="Go West">W</button>
      <div class="compass-center"><div class="compass-pip"></div></div>
      <button class="compass-btn" data-dir="east" title="Go East">E</button>
      <div class="compass-empty"></div>
      <button class="compass-btn" data-dir="south" title="Go South">S</button>
      <div class="compass-empty"></div>
    </div>
  </div>

  <div class="stats-bar" id="statsBar">
    <div class="stat-item">
      <span class="stat-label">Name</span>
      <span class="stat-value" id="stat-name">—</span>
    </div>
    <div class="stat-item stat-hp">
      <span class="stat-label">HP</span>
      <span class="stat-value" id="stat-hp">100</span>
    </div>
    <div class="stat-item">
      <span class="stat-label">Level</span>
      <span class="stat-value" id="stat-level">1</span>
    </div>
    <div class="stat-item stat-xp">
      <span class="stat-label">XP</span>
      <span class="stat-value" id="stat-xp">0</span>
    </div>
    <div class="stat-item stat-gold">
      <span class="stat-label" id="stat-currency-label">Gold</span>
      <span class="stat-value" id="stat-gold">0</span>
    </div>
  </div>

  <div class="panel inventory-panel">
    <h3>INVENTORY</h3>
    <div id="inventory"></div>
  </div>

  <script>
    const logDiv = document.getElementById('log');
    const mapDiv = document.getElementById('map');
    const generatedDiv = document.getElementById('generated');
    const form = document.getElementById('commandForm');
    const inventoryDiv = document.getElementById('inventory');

    const renderStats = (stats) => {
      if (!stats) return;
      if (stats.name) document.getElementById('stat-name').textContent = stats.name;
      document.getElementById('stat-hp').textContent = stats.hp ?? 100;
      document.getElementById('stat-level').textContent = stats.level ?? 1;
      document.getElementById('stat-xp').textContent = stats.xp ?? 0;
      document.getElementById('stat-gold').textContent = stats.gold ?? 0;
      if (stats.currency) document.getElementById('stat-currency-label').textContent = stats.currency;
    };

    const renderInventory = (items) => {
      const list = Array.isArray(items) ? items : [];
      if (!list.length) {
        inventoryDiv.innerHTML = '<em>Empty</em>';
        return;
      }
      const html = [];
      list.forEach(it => {
        if (typeof it === 'string') {
          html.push(`<div class="inv-card"><div class="inv-name">${it}</div></div>`);
          return;
        }
        const name = it.name || 'Item';
        const rarity = it.rarity || 'Common';
        const value = it.value != null ? `${it.value} gp` : '';
        const desc = it.desc || '';
        html.push(
          `<div class="inv-card">`
          + `<div class="inv-name">${name}</div>`
          + `<div class="inv-meta">${rarity}${value ? ' • ' + value : ''}</div>`
          + `<div class="inv-desc">${desc}</div>`
          + `</div>`
        );
      });
      inventoryDiv.innerHTML = html.join('');
    };

    const renderResponse = (html) => {
      const temp = document.createElement('div');
      temp.innerHTML = html || '';

      // Detailed room render (large map)
      const img = temp.querySelector('img');
      if (img) {
        img.remove();
        generatedDiv.innerHTML = '';
        generatedDiv.appendChild(img);
      }

      // World minimap (visited/current)
      const world = temp.querySelector('[data-role="worldmap"]');
      if (world) {
        world.remove();
        mapDiv.innerHTML = '';
        mapDiv.appendChild(world);
      }

      // Remaining text to log
      if (temp.innerHTML.trim()) {
        logDiv.innerHTML += `<div>${temp.innerHTML}</div>`;
      }
      logDiv.scrollTop = logDiv.scrollHeight;
    };

    // Append the initial response from Flask
    const firstResponse = {{ first_response | tojson }};
    const firstInventory = {{ first_inventory | tojson }};
    const firstStats = {{ first_stats | tojson }};
    {% if first_map is defined %}
    const firstMap = {{ first_map | tojson }};
    if (firstMap && firstMap !== "None") {
      mapDiv.innerHTML = firstMap;
    }
    {% endif %}
    if (firstResponse && firstResponse !== "None") {
      renderResponse(firstResponse);
    }
    renderInventory(firstInventory);
    renderStats(firstStats);

    const inputEl = document.getElementById('command');
    const submitBtn = form.querySelector('button[type=submit]');
    const compassBtns = document.querySelectorAll('.compass-btn');

    function setLoading(on) {
      inputEl.disabled = on;
      submitBtn.disabled = on;
      compassBtns.forEach(b => b.disabled = on);
    }

    async function sendCommand(command) {
      logDiv.innerHTML += `<div style="color:#6f6;">> ${command}</div>`;
      const loadingEl = document.createElement('div');
      loadingEl.className = 'loading-msg';
      loadingEl.textContent = 'Thinking';
      logDiv.appendChild(loadingEl);
      logDiv.scrollTop = logDiv.scrollHeight;
      setLoading(true);
      try {
        const response = await fetch('/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ command })
        });
        let data;
        try {
          data = await response.json();
        } catch (parseErr) {
          const text = await response.text();
          throw new Error(`Server response was not JSON. Status ${response.status}. Body: ${text.slice(0, 200)}`);
        }
        loadingEl.remove();
        renderResponse(data.response);
        if (data.map) { mapDiv.innerHTML = data.map; }
        if (data.inventory) { renderInventory(data.inventory); }
        if (data.stats) { renderStats(data.stats); }
        if (data.room_name) { document.getElementById('room-name').textContent = data.room_name; }
      } catch (err) {
        loadingEl.remove();
        logDiv.innerHTML += `<div style="color:red;">Error: ${err}</div>`;
      } finally {
        setLoading(false);
        inputEl.focus();
      }
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      const command = document.getElementById('command').value.trim();
      if (!command) return;
      document.getElementById('command').value = '';
      await sendCommand(command);
    });

    document.querySelectorAll('.compass-btn').forEach(btn => {
      btn.addEventListener('click', () => sendCommand(btn.dataset.dir));
    });

    document.getElementById('restartBtn').addEventListener('click', () => {
      if (confirm('Restart your game? This will reset your progress.')) {
        sendCommand('restart');
      }
    });
  </script>
</body>
</html>
